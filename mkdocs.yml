site_name: AI Finance Lab
site_description: Building the next generation of AI-enabled finance professionals
site_url: ""

theme:
  name: material
  logo: assets/4MATR Logo.png
  favicon: assets/4MATR Logo.png

  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - md_in_html

